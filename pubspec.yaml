name: egaming
description: تطبيق eGaming لإدارة بطولات eFootball بين الأصدقاء (يعمل بالكامل بدون إنترنت)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # قاعدة البيانات المحلية
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # إدارة الحالة
  provider: ^6.1.1

  # أدوات مساعدة
  uuid: ^4.2.1
  intl: ^0.20.2

  # الصور والشعارات
  image_picker: ^1.0.4

  # الرسوم البيانية (لشاشة تحليل البطولة لاحقًا)
  fl_chart: ^0.65.0

  # تصدير PDF ومشاركة (لتقرير البطولة لاحقًا)
  pdf: ^3.10.7
  printing: ^5.11.1
  share_plus: ^7.2.1

  # الإعدادات المحفوظة محليًا
  shared_preferences: ^2.2.2

  # اختيار ملفات من الجهاز (لاستعادة النسخ الاحتياطية)
  file_picker: ^8.0.0+1

  # الاهتزاز
  vibration: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/countries/
    - assets/logos/clubs/
    - assets/logos/tournaments/
    - assets/sounds/
