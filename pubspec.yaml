name: egaming
description: تطبيق eGaming لإدارة بطولات eFootball بين الأصدقاء (يعمل بالكامل بدون إنترنت)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # قاعدة البيانات المحلية
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # إدارة الحالة
  provider: ^6.1.2

  # أدوات مساعدة
  uuid: ^4.5.1
  # مثبتة تلقائيًا حسب النسخة التي يفرضها flutter_localizations من الـ SDK
  # لتفادي أي تعارض في الإصدارات (Version Solving Failure) على أي بيئة بناء.
  intl: any

  # الصور والشعارات
  image_picker: ^1.1.2

  # تصدير PDF ومشاركة (لتقرير البطولة)
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^12.0.1

  # الإعدادات المحفوظة محليًا
  shared_preferences: ^2.3.3

  # اختيار ملفات من الجهاز (لاستعادة النسخ الاحتياطية)
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
